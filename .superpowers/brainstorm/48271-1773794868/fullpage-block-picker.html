<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TideLearn — Block Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #f5fffe;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 48px;
  padding: 48px;
  min-height: 100vh;
}

/* context: the add block row it emerges from */
.context {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  width: 680px;
}

.add-row {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  margin-bottom: 0;
}
.add-line { flex: 1; height: 1.5px; background: #99f6e4; }
.add-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  border-radius: 20px;
  background: white;
  border: 1.5px solid #14b8a6;
  color: #0d9488;
  font-size: 12px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  box-shadow: 0 2px 10px rgba(13,148,136,0.15);
}

/* ── POPUP ── */
.popup {
  background: white;
  border: 1px solid #d1faf4;
  border-radius: 14px;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.12),
    0 4px 16px rgba(13,148,136,0.08);
  width: 440px;
  overflow: hidden;
  margin-top: 4px;
}

.popup-search {
  padding: 12px 14px 10px;
  border-bottom: 1px solid #f0fdf4;
  position: relative;
}
.popup-search-icon {
  position: absolute;
  left: 24px;
  top: 50%;
  transform: translateY(-54%);
  font-size: 12px;
  color: #94a3b8;
}
.popup-search input {
  width: 100%;
  border: 1px solid #e0fdf4;
  border-radius: 6px;
  padding: 7px 10px 7px 30px;
  font-size: 12.5px;
  font-family: inherit;
  color: #0f172a;
  outline: none;
  background: #f8fffe;
}
.popup-search input:focus { border-color: #14b8a6; }
.popup-search input::placeholder { color: #b0c4c0; }

.popup-body {
  padding: 10px 10px 12px;
}

.category-label {
  font-size: 9px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #94a3b8;
  padding: 6px 6px 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.category-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #f0f4f3;
}

.block-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  margin-bottom: 2px;
}

.block-tile {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 9px 4px 8px;
  border-radius: 8px;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: background 0.1s, border-color 0.1s;
}
.block-tile:hover {
  background: #f0fdfb;
  border-color: #99f6e4;
}
.block-tile.active {
  background: #e0fdf7;
  border-color: #14b8a6;
}
.tile-icon {
  font-size: 18px;
  line-height: 1;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  background: #f5fffe;
  font-size: 17px;
}
.block-tile:hover .tile-icon { background: #e0fdf7; }
.block-tile.active .tile-icon { background: #ccfbf1; }

/* category colour tints */
.tile-text .tile-icon  { background: #f0fdf4; }
.tile-media .tile-icon { background: #eff6ff; }
.tile-interactive .tile-icon { background: #faf5ff; }
.tile-knowledge .tile-icon { background: #fff7ed; }

.tile-label {
  font-size: 10.5px;
  font-weight: 600;
  color: #334155;
  text-align: center;
  line-height: 1.2;
}
.block-tile.active .tile-label { color: #0d9488; }
</style>
</head>
<body>

<div class="context">

  <!-- The + Add block row the popup emerges from -->
  <div class="add-row">
    <div class="add-line"></div>
    <button class="add-btn">＋ Add block</button>
    <div class="add-line"></div>
  </div>

  <!-- The popup -->
  <div class="popup">

    <div class="popup-search">
      <span class="popup-search-icon">🔍</span>
      <input placeholder="Search blocks…" />
    </div>

    <div class="popup-body">

      <!-- TEXT -->
      <div class="category-label">Text</div>
      <div class="block-grid">
        <div class="block-tile tile-text active">
          <div class="tile-icon">H</div>
          <span class="tile-label">Heading</span>
        </div>
        <div class="block-tile tile-text">
          <div class="tile-icon">¶</div>
          <span class="tile-label">Text</span>
        </div>
        <div class="block-tile tile-text">
          <div class="tile-icon">≡</div>
          <span class="tile-label">List</span>
        </div>
        <div class="block-tile tile-text">
          <div class="tile-icon">❝</div>
          <span class="tile-label">Quote</span>
        </div>
        <div class="block-tile tile-text">
          <div class="tile-icon">💡</div>
          <span class="tile-label">Callout</span>
        </div>
        <div class="block-tile tile-text">
          <div class="tile-icon">&lt;/&gt;</div>
          <span class="tile-label">Code</span>
        </div>
        <div class="block-tile tile-text">
          <div class="tile-icon">—</div>
          <span class="tile-label">Divider</span>
        </div>
        <div class="block-tile tile-text">
          <div class="tile-icon">📋</div>
          <span class="tile-label">Contents</span>
        </div>
      </div>

      <!-- MEDIA -->
      <div class="category-label">Media</div>
      <div class="block-grid">
        <div class="block-tile tile-media">
          <div class="tile-icon">🖼</div>
          <span class="tile-label">Image</span>
        </div>
        <div class="block-tile tile-media">
          <div class="tile-icon">▶</div>
          <span class="tile-label">Video</span>
        </div>
        <div class="block-tile tile-media">
          <div class="tile-icon">🎵</div>
          <span class="tile-label">Audio</span>
        </div>
      </div>

      <!-- INTERACTIVE -->
      <div class="category-label">Interactive</div>
      <div class="block-grid">
        <div class="block-tile tile-interactive">
          <div class="tile-icon">＋</div>
          <span class="tile-label">Accordion</span>
        </div>
        <div class="block-tile tile-interactive">
          <div class="tile-icon">⊡</div>
          <span class="tile-label">Tabs</span>
        </div>
      </div>

      <!-- KNOWLEDGE -->
      <div class="category-label">Knowledge Check</div>
      <div class="block-grid">
        <div class="block-tile tile-knowledge">
          <div class="tile-icon">✅</div>
          <span class="tile-label">True / False</span>
        </div>
        <div class="block-tile tile-knowledge">
          <div class="tile-icon">⊙</div>
          <span class="tile-label">Multiple Choice</span>
        </div>
        <div class="block-tile tile-knowledge">
          <div class="tile-icon">✏️</div>
          <span class="tile-label">Short Answer</span>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
