<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TideLearn — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #071612;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  position: relative;
  overflow: hidden;
}

/* Ocean background glow */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(13,148,136,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 100%, rgba(6,182,212,0.1) 0%, transparent 55%);
  pointer-events: none;
}

/* Subtle wave texture */
body::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 200px;
  background: linear-gradient(180deg, transparent 0%, rgba(20,184,166,0.04) 100%);
  pointer-events: none;
}

/* Card */
.card {
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  width: 400px;
  overflow: hidden;
  box-shadow:
    0 32px 64px rgba(0,0,0,0.4),
    0 0 0 1px rgba(20,184,166,0.06) inset;
}

/* Teal stripe */
.card-stripe {
  height: 3px;
  background: linear-gradient(90deg, #14b8a6, #06b6d4, #0891b2);
}

.card-body {
  padding: 36px 36px 32px;
}

/* Logo */
.logo {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 28px;
}
.logo-mark {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: linear-gradient(135deg, #14b8a6, #06b6d4);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.logo-text {
  font-size: 15px;
  font-weight: 800;
  color: white;
  letter-spacing: -0.04em;
}

h1 {
  font-family: 'Lora', Georgia, serif;
  font-size: 22px;
  font-weight: 700;
  color: white;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  line-height: 1.2;
}
.subtitle {
  font-size: 13px;
  color: rgba(148,210,204,0.6);
  margin-bottom: 28px;
  line-height: 1.5;
}

/* OAuth buttons */
.oauth-row {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}
.oauth-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 11px 16px;
  border-radius: 8px;
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s, border-color 0.15s;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.9);
}
.oauth-btn:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.16);
}
.oauth-icon {
  width: 18px; height: 18px;
  flex-shrink: 0;
}

/* Divider */
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
.divider-text { font-size: 11px; color: rgba(148,210,204,0.4); font-weight: 500; }

/* Email form */
.form-group {
  margin-bottom: 12px;
}
.form-label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  color: rgba(148,210,204,0.6);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.form-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 7px;
  padding: 10px 14px;
  font-size: 14px;
  color: white;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.form-input::placeholder { color: rgba(148,210,204,0.3); }
.form-input:focus {
  border-color: rgba(20,184,166,0.5);
  background: rgba(255,255,255,0.07);
}

/* Submit */
.btn-submit {
  width: 100%;
  background: linear-gradient(135deg, #0d9488, #0891b2);
  color: white;
  padding: 11px 16px;
  border-radius: 7px;
  font-size: 14px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  font-family: inherit;
  margin-top: 6px;
  letter-spacing: -0.01em;
}
.btn-submit:hover { opacity: 0.92; }

/* Footer note */
.card-footer-note {
  padding: 16px 36px;
  border-top: 1px solid rgba(255,255,255,0.06);
  background: rgba(0,0,0,0.15);
  text-align: center;
}
.card-footer-note p {
  font-size: 12px;
  color: rgba(148,210,204,0.4);
}
.card-footer-note a {
  color: #5eead4;
  text-decoration: none;
  font-weight: 600;
}
</style>
</head>
<body>

<div class="card">
  <div class="card-stripe"></div>
  <div class="card-body">

    <div class="logo">
      <div class="logo-mark">🌊</div>
      <span class="logo-text">TideLearn</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access your courses and continue building.</p>

    <div class="oauth-row">
      <button class="oauth-btn">
        <!-- Google SVG -->
        <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or email</span>
      <div class="divider-line"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" placeholder="you@example.com" value="theo@example.com" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" placeholder="••••••••" value="password" />
    </div>

    <button class="btn-submit">Sign in →</button>

  </div>
  <div class="card-footer-note">
    <p>No account? <a href="#">Create one free</a></p>
  </div>
</div>

</body>
</html>
