<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TideLearn — All Pages</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #071612;
  min-height: 100vh;
  padding: 24px 24px 36px;
}
.header { text-align:center; margin-bottom:18px; }
.header h1 { font-size:10px;font-weight:700;color:rgba(94,234,212,0.4);text-transform:uppercase;letter-spacing:0.14em; }

/* top row: 3 equal */
.row-top {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 16px;
}

/* bottom row: editor takes full width */
.row-bottom {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

.slot { display:flex; flex-direction:column; gap:6px; }
.slot-label {
  font-size:9.5px;font-weight:700;color:rgba(94,234,212,0.5);
  text-transform:uppercase;letter-spacing:0.1em;
  display:flex;align-items:center;gap:8px;
}
.slot-label::after { content:'';flex:1;height:1px;background:rgba(20,184,166,0.12); }

.frame-wrap {
  border-radius:8px;overflow:hidden;
  border:1px solid rgba(20,184,166,0.12);
  box-shadow:0 12px 40px rgba(0,0,0,0.5);
  position:relative;
}
.frame-inner {
  position:absolute;top:0;left:0;
  width:1280px;height:800px;
  transform-origin:top left;
}
iframe { width:100%;height:100%;border:none;display:block; }
</style>
</head>
<body>

<div class="header"><h1>TideLearn — Page Designs</h1></div>

<div class="row-top">
  <div class="slot">
    <div class="slot-label">01 — Landing</div>
    <div class="frame-wrap"><div class="frame-inner"><iframe src="fullpage-immersive.html" scrolling="no"></iframe></div></div>
  </div>
  <div class="slot">
    <div class="slot-label">02 — Courses</div>
    <div class="frame-wrap"><div class="frame-inner"><iframe src="fullpage-courses-v7.html" scrolling="no"></iframe></div></div>
  </div>
  <div class="slot">
    <div class="slot-label">03 — Auth</div>
    <div class="frame-wrap"><div class="frame-inner"><iframe src="fullpage-auth-v2.html" scrolling="no"></iframe></div></div>
  </div>
</div>

<div class="row-bottom">
  <div class="slot">
    <div class="slot-label">04 — Editor</div>
    <div class="frame-wrap"><div class="frame-inner"><iframe src="fullpage-editor-v3.html" scrolling="no"></iframe></div></div>
  </div>
</div>

<script>
function scale() {
  document.querySelectorAll('.frame-wrap').forEach(wrap => {
    const s = wrap.offsetWidth / 1280;
    wrap.style.height = (800 * s) + 'px';
    wrap.querySelector('.frame-inner').style.transform = `scale(${s})`;
  });
}
scale();
window.addEventListener('resize', scale);
</script>
</body>
</html>
